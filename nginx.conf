events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 200M;   # Allow large image/video uploads

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Backend upstream
    upstream backend {
        server backend:8000;
    }

    # ── Port 3001: HTTP frontend (direct / internal access, no SSL) ──────────────
    server {
        listen 3001;
        listen [::]:3001;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy /api/v1 and /ws to backend even on port 3001
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
        }

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Health check (mapped to backend)
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # SPA fallback — React handles its own routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Port 80: HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        # TODO: Replace with your actual subdomain, e.g. ai-vision.m-devsecops.com
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Port 443: HTTPS (SSL termination + frontend + API proxy) ─────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        # TODO: Replace with your actual subdomain, e.g. ai-vision.m-devsecops.com
        # The wildcard cert covers *.m-devsecops.com so any subdomain works.
        server_name _;

        # ── SSL certificates (mounted from ./ssl/) ────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Corporate CA chain for client verification (optional but good practice)
        ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;

        # TLS settings — TLS 1.2 minimum, strong ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

        root /usr/share/nginx/html;
        index index.html;

        # Common proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        # ── WebSocket ────────────────────────────────────────────────────────
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400;
        }

        # ── API routes → backend:8000 ────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_redirect off;
            proxy_buffering off;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Uploaded images/videos (served directly by Nginx — fast) ─────────
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── React static assets (JS/CSS bundles) ─────────────────────────────
        location /static/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            gzip_static on;
        }

        # ── SPA fallback — React Router handles client-side routing ──────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
