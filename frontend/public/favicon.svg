<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#07091c"/>

  <!-- Bounding-box corner marks -->
  <polyline points="7,13 7,7 13,7"   fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="19,7 25,7 25,13" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="25,19 25,25 19,25" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="13,25 7,25 7,19" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Centre target dot -->
  <circle cx="16" cy="16" r="3" fill="#a5b4fc"/>

  <!-- Crosshair ticks -->
  <line x1="16" y1="12" x2="16" y2="10.5" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="16" y2="21.5" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="10.5" y2="16" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="16" x2="21.5" y2="16" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
