<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8173e"/>
      <stop offset="100%" stop-color="#9c0e26"/>
    </linearGradient>
  </defs>

  <!-- Crimson gradient rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- White bounding-box corner marks — computer vision / detection -->
  <polyline points="6,12 6,6 12,6"   fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="20,6 26,6 26,12" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="26,20 26,26 20,26" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="12,26 6,26 6,20" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pulse ring — AI targeting -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>

  <!-- Centre detection dot -->
  <circle cx="16" cy="16" r="2.8" fill="white"/>
</svg>
